<!DOCTYPE html>
<html>
<head>
  <title>Log Generator</title>

  <style>
    body {
      font-family: 'Segoe UI';
      background: linear-gradient(135deg,#2c5364,#203a43,#0f2027);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .container {
      width:420px;
      background:white;
      padding:25px;
      border-radius:15px;
      text-align:center;
      box-shadow:0 20px 50px rgba(0,0,0,0.3);
    }

    input,select {
      width:100%;
      padding:10px;
      margin:8px 0;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button {
      width:100%;
      padding:10px;
      margin-top:8px;
      border:none;
      border-radius:6px;
      background:#00b894;
      color:white;
      cursor:pointer;
    }

    button:hover { background:#019875; }

    .danger { background:#dc2626; }
    .danger:hover { background:#b91c1c; }

    .success { margin-top:10px; color:green; font-weight:bold; }
  </style>
</head>

<body>

<div class="container">
  <h2>📄 Log Generator</h2>

  <input id="message" placeholder="Log message">

  <select id="level">
    <option>INFO</option>
    <option>WARNING</option>
    <option>ERROR</option>
  </select>

  <input id="service" placeholder="Service (Auth/API/DB)">
  <input id="ip" placeholder="IP Address">

  <button onclick="addLog()">Add Log</button>

  <button onclick="startAutoLogs()">⚡ Start Auto Logs</button>
  <button class="danger" onclick="stopAutoLogs()">⛔ Stop Auto Logs</button>

  <label>Speed (ms):</label>
  <input type="range" id="speed" min="500" max="5000" step="500" value="2000">

  <button onclick="window.location.href='dashboard.html'">📊 Dashboard</button>

  <div id="status" class="success"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAhte8VRjmeIj7tbekNT4_V8eziSvP1XQM",
  authDomain: "cloud-log-monitoring-sys-e69b1.firebaseapp.com",
  projectId: "cloud-log-monitoring-sys-e69b1"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
firebase.auth().signInAnonymously();

function generateLogId(){
  return "LOG-"+Math.floor(1000+Math.random()*9000);
}

// 🔹 Manual log
function addLog(){
  const msgEl = document.getElementById("message");
  const levelEl = document.getElementById("level");
  const serviceEl = document.getElementById("service");
  const ipEl = document.getElementById("ip");
  const statusEl = document.getElementById("status");

  const msg = msgEl.value;
  const level = levelEl.value;
  const service = serviceEl.value || "Unknown";
  const ip = ipEl.value || "0.0.0.0";

  if(!msg){
    alert("Enter message");
    return;
  }

  db.collection("logs").add({
    logId: generateLogId(),
    message: msg,
    level,
    service,
    ip,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  });

  statusEl.innerText = "✅ Log Added";

  msgEl.value = "";
  serviceEl.value = "";
  ipEl.value = "";
}

// 🔥 Auto log generator
let autoInterval;

const messages=[
"Database connection failed",
"User authenticated successfully",
"API returned 500 error",
"SQL injection attempt blocked",
"High CPU usage detected",
"Service unavailable",
"Brute force login attempt detected"
];

const services=[
"Auth Service","API Gateway","Database Service","Firewall","Web Server"
];

function randomIP(){
return `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
}

function randomLevel(){
const levels=["INFO","WARNING","ERROR"];
return levels[Math.floor(Math.random()*levels.length)];
}

function startAutoLogs(){
  const statusEl = document.getElementById("status");
  const speed = document.getElementById("speed").value;

  if(autoInterval){
    statusEl.innerText = "⚡ Already running";
    return;
  }

  autoInterval = setInterval(()=>{
    db.collection("logs").add({
      logId: generateLogId(),
      message: messages[Math.floor(Math.random()*messages.length)],
      level: randomLevel(),
      service: services[Math.floor(Math.random()*services.length)],
      ip: randomIP(),
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
  }, speed);

  statusEl.innerText = "⚡ Auto logs running...";
}

function stopAutoLogs(){
  const statusEl = document.getElementById("status");

  if(autoInterval){
    clearInterval(autoInterval);
    autoInterval = null;
    statusEl.innerText = "⛔ Auto logs stopped";
  }
}
</script>

</body>
</html>
